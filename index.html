<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>INTUITY — Speaking Practice</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --topic-color: #C9A961; --topic-rgb: 201,169,97;
      --ink: #f0ede8; --bg: #111010; --card-bg: rgba(26,24,22,0.98);
    }
    html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); }
    body { font-family: 'DM Sans', sans-serif; color: var(--ink); user-select: none; -webkit-user-select: none; }

    .header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; justify-content: space-between; align-items: center;
      padding: .65rem 1.4rem;
      background: rgba(17,16,16,.92); backdrop-filter: blur(24px);
      border-bottom: 1px solid rgba(255,255,255,.06); height: 54px;
    }
    .back-link {
      text-decoration: none; font-family: 'DM Sans', sans-serif;
      font-size: .6rem; font-weight: 600; letter-spacing: .1em; text-transform: uppercase;
      color: rgba(240,237,232,.28); transition: color .2s; white-space: nowrap; flex-shrink: 0;
    }
    .back-link:hover { color: rgba(240,237,232,.7); }
    .topic-tabs {
      flex: 1; display: flex; align-items: center; justify-content: center;
      gap: .28rem; overflow-x: auto; padding: 0 .75rem; scrollbar-width: none;
    }
    .topic-tabs::-webkit-scrollbar { display: none; }
    .ttab {
      font-family: 'DM Sans', sans-serif; font-size: .56rem; font-weight: 700;
      letter-spacing: .08em; text-transform: uppercase;
      padding: .3rem .8rem; border-radius: 999px; border: 1px solid transparent;
      background: transparent; color: rgba(240,237,232,.28); cursor: pointer;
      transition: all .22s; white-space: nowrap; flex-shrink: 0;
    }
    .ttab:hover { color: rgba(240,237,232,.65); border-color: rgba(255,255,255,.12); }
    .ttab.active { color: var(--topic-color); border-color: var(--topic-color); background: rgba(var(--topic-rgb), .1); }
    .ttab::after {
      content: ''; display: inline-block; width: 5px; height: 5px;
      border-radius: 50%; margin-left: .4rem; vertical-align: middle; opacity: 0; transition: opacity .3s;
    }
    .ttab.done::after { background: #4DC98A; opacity: 1; }
    .slide-counter {
      flex-shrink: 0; font-family: 'DM Sans', sans-serif; font-size: .58rem; font-weight: 600;
      letter-spacing: .06em; color: rgba(240,237,232,.28);
      background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.08);
      border-radius: 999px; padding: .28rem .75rem; min-width: 64px; text-align: center;
    }

    .stage {
      position: fixed; top: 54px; left: 0; right: 0; bottom: 72px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: .75rem 1rem;
    }
    .slide-card {
      position: relative; width: 100%; max-width: 820px; flex: 1; max-height: 560px;
      background: var(--card-bg); border-radius: 1.5rem;
      border: 1px solid rgba(var(--topic-rgb), .18); overflow: hidden;
      box-shadow: 0 28px 80px rgba(0,0,0,.85), 0 0 100px rgba(var(--topic-rgb), .05);
      transition: border-color .4s;
    }
    .slide-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: var(--topic-color); opacity: .75; transition: background .4s; z-index: 5;
    }
    .slides-container { position: relative; width: 100%; height: calc(100% - 52px); overflow: hidden; }

    .slide {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 2rem 3.5rem 1.5rem; gap: 1.1rem;
      opacity: 0; transform: translateX(60px);
      transition: opacity .42s cubic-bezier(.4,0,.2,1), transform .42s cubic-bezier(.4,0,.2,1);
      pointer-events: none;
    }
    .slide.active   { opacity: 1; transform: translateX(0); pointer-events: auto; z-index: 10; }
    .slide.exit-left { opacity: 0; transform: translateX(-60px); pointer-events: none; }

    /* ── QUESTION ── */
    .q-label {
      font-family: 'DM Sans', sans-serif; font-size: .52rem; font-weight: 700;
      letter-spacing: .22em; text-transform: uppercase; color: var(--topic-color); opacity: .65;
    }
    .q-text {
      font-family: 'Lora', serif; font-weight: 600;
      line-height: 1.35; text-align: center; color: #f5f2ec; width: 100%;
    }
    .q-text.size-short  { font-size: clamp(1.55rem, 3.8vw, 2.6rem); }
    .q-text.size-medium { font-size: clamp(1.25rem, 3vw, 2rem); }
    .q-text.size-long   { font-size: clamp(1.05rem, 2.4vw, 1.65rem); }
    .q-text .hl { color: var(--topic-color); font-style: italic; }

    /* ── OPTIONS — no boxes ── */
    .options-wrap { display: flex; flex-direction: column; gap: 0; width: 100%; max-width: 600px; }
    .opt-btn {
      display: flex; align-items: baseline; gap: .7rem;
      width: 100%; background: transparent; border: none;
      border-bottom: 1px solid rgba(255,255,255,.04);
      padding: .58rem .5rem; cursor: pointer;
      transition: background .15s; text-align: left; border-radius: 6px;
    }
    .opt-btn:last-child { border-bottom: none; }
    .opt-btn:hover:not(.locked) { background: rgba(var(--topic-rgb), .07); }
    .opt-btn.locked { cursor: default; }
    .opt-letter {
      font-family: 'DM Sans', sans-serif; font-size: .54rem; font-weight: 700;
      letter-spacing: .12em; text-transform: uppercase;
      color: rgba(240,237,232,.2); flex-shrink: 0; width: 16px; transition: color .15s;
    }
    .opt-text {
      font-family: 'Lora', serif; font-size: clamp(.84rem, 1.85vw, 1.02rem);
      font-style: italic; line-height: 1.55; color: rgba(240,237,232,.48); transition: color .15s;
    }
    .opt-btn.chosen .opt-letter { color: var(--topic-color); }
    .opt-btn.chosen .opt-text   { color: rgba(240,237,232,.88); }
    .opt-btn.chosen { background: rgba(var(--topic-rgb), .07); animation: optPop .24s ease; }
    .opt-btn.not-chosen { opacity: .28; }
    @keyframes optPop { 0%{transform:translateX(0)} 35%{transform:translateX(4px)} 100%{transform:translateX(0)} }

    /* ── GRAMMAR SLIDE ── */
    .grammar-point {
      font-family: 'DM Sans', sans-serif; font-size: .56rem; font-weight: 700;
      letter-spacing: .2em; text-transform: uppercase; color: rgba(var(--topic-rgb), .55);
    }
    .grammar-rule {
      font-family: 'Lora', serif; font-size: clamp(.95rem, 2.2vw, 1.35rem);
      font-style: italic; color: rgba(240,237,232,.72);
      text-align: center; line-height: 1.6; max-width: 560px;
    }
    .grammar-rule strong { color: var(--topic-color); font-style: normal; font-weight: 700; }
    .grammar-examples {
      font-family: 'Lora', serif; font-size: clamp(.78rem, 1.65vw, .95rem);
      font-style: italic; color: rgba(240,237,232,.32);
      text-align: center; line-height: 1.8; max-width: 540px;
    }
    .grammar-examples em { color: var(--topic-color); font-style: normal; }

    /* ── VOCABULARY SLIDE ── */
    .vocab-pos {
      font-family: 'DM Sans', sans-serif; font-size: .58rem; font-weight: 700;
      letter-spacing: .2em; text-transform: uppercase; color: rgba(var(--topic-rgb), .5);
    }
    .vocab-word {
      font-family: 'Lora', serif; font-size: clamp(2rem, 6vw, 3.8rem);
      font-weight: 700; color: #f5f2ec; letter-spacing: -.02em; line-height: 1;
    }
    .vocab-def {
      font-family: 'Lora', serif; font-size: clamp(.88rem, 1.9vw, 1.1rem);
      font-style: italic; color: rgba(240,237,232,.52);
      text-align: center; line-height: 1.65; max-width: 520px;
    }
    .vocab-ex {
      font-family: 'Lora', serif; font-size: clamp(.78rem, 1.6vw, .93rem);
      font-style: italic; color: rgba(240,237,232,.28);
      text-align: center; line-height: 1.6; max-width: 500px;
      border-left: 2px solid rgba(var(--topic-rgb), .28); padding-left: .85rem;
    }

    /* ── FEEDBACK ── */
    .fb-bar {
      height: 0; overflow: hidden; display: flex; align-items: center;
      gap: .6rem; padding: 0 1.4rem;
      transition: height .22s cubic-bezier(.22,1,.36,1);
      position: absolute; bottom: 52px; left: 0; right: 0; background: rgba(0,0,0,.18);
    }
    .fb-bar.show { height: 36px; border-top: 1px solid rgba(255,255,255,.05); }
    .fb-text { font-family: 'DM Sans', sans-serif; font-size: .8rem; color: rgba(240,237,232,.4); }
    .fb-text strong { color: var(--topic-color); font-weight: 600; }
    .fb-text em { color: rgba(240,237,232,.55); font-style: italic; }

    .section-label {
      position: absolute; top: .9rem; left: 50%; transform: translateX(-50%);
      font-family: 'DM Sans', sans-serif; font-size: .5rem; font-weight: 700;
      letter-spacing: .22em; text-transform: uppercase; color: var(--topic-color);
      opacity: 0; transition: opacity .3s; pointer-events: none; white-space: nowrap; z-index: 20;
    }
    .section-label.visible { opacity: .5; }

    .nav-arrows {
      position: absolute; top: 50%; left: 0; right: 0; transform: translateY(-50%);
      display: flex; justify-content: space-between; padding: 0 .65rem;
      pointer-events: none; z-index: 20;
    }
    .arrow-btn {
      pointer-events: all; width: 40px; height: 40px; border-radius: 50%;
      background: rgba(var(--topic-rgb), .1); border: 1px solid rgba(var(--topic-rgb), .22);
      color: var(--topic-color); font-size: 1rem;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all .22s;
    }
    .arrow-btn:hover:not(:disabled) { background: rgba(var(--topic-rgb), .24); transform: scale(1.1); }
    .arrow-btn:disabled { opacity: .12; cursor: not-allowed; }

    .dot-nav {
      height: 52px; display: flex; align-items: center; justify-content: center;
      gap: .46rem; background: rgba(0,0,0,.22); border-top: 1px solid rgba(255,255,255,.04);
      flex-wrap: wrap; padding: 0 1rem;
    }
    .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: rgba(99,99,102,.28); cursor: pointer; transition: all .3s;
      flex-shrink: 0; border: none;
    }
    .dot.active { background: var(--topic-color); transform: scale(1.5); box-shadow: 0 0 8px rgba(var(--topic-rgb),.5); }
    .dot.ok     { background: #4DC98A; opacity: .75; }
    .dot:hover:not(.active) { background: rgba(var(--topic-rgb), .5); }

    .bottom-bar {
      position: fixed; bottom: 0; left: 0; right: 0; height: 72px;
      padding: .6rem 1.4rem .75rem;
      display: flex; align-items: center; justify-content: space-between; gap: 1rem;
      background: rgba(17,16,16,.92); backdrop-filter: blur(24px);
      border-top: 1px solid rgba(255,255,255,.06);
    }
    .score-row { display: flex; align-items: center; gap: .5rem; flex-shrink: 0; }
    .score-item {
      font-family: 'DM Sans', sans-serif; font-size: .7rem; font-weight: 600;
      display: flex; align-items: center; gap: .35rem; color: rgba(240,237,232,.3);
    }
    .score-dot { width: 7px; height: 7px; border-radius: 50%; background: #4DC98A; }
    .score-label { font-size: .6rem; font-style: italic; }

    .auto-row { display: flex; align-items: center; gap: .5rem; cursor: pointer; flex-shrink: 0; }
    .auto-label {
      font-family: 'DM Sans', sans-serif; font-size: .52rem; font-weight: 700;
      letter-spacing: .1em; text-transform: uppercase; color: rgba(255,255,255,.22); transition: color .3s;
    }
    .auto-row.on .auto-label { color: rgba(255,255,255,.65); }
    .switch {
      width: 38px; height: 21px; border-radius: 999px;
      background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.1); position: relative; transition: all .3s;
    }
    .auto-row.on .switch { background: rgba(var(--topic-rgb), .22); border-color: var(--topic-color); }
    .switch::after {
      content: ''; position: absolute; top: 2px; left: 2px; width: 15px; height: 15px; border-radius: 50%;
      background: rgba(255,255,255,.3); transition: transform .3s, background .3s;
    }
    .auto-row.on .switch::after { transform: translateX(17px); background: var(--topic-color); }

    .progress { position: fixed; bottom: 72px; left: 0; right: 0; height: 2px; background: rgba(255,255,255,.04); z-index: 50; }
    .progress-fill { height: 100%; background: var(--topic-color); width: 0%; transition: width .4s ease, background .4s; }

    .loading-screen { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: var(--bg); z-index: 999; transition: opacity .6s; }
    .loading-screen.fade { opacity: 0; pointer-events: none; }
    .ld { width: 7px; height: 7px; border-radius: 50%; background: var(--topic-color); animation: ld 1.2s ease-in-out infinite; }
    @keyframes ld { 0%,100%{opacity:.2;transform:scale(.7)} 50%{opacity:1;transform:scale(1.3)} }

    /* ── RESULTS OVERLAY ── */
    .overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(8,7,7,.97); backdrop-filter: blur(28px);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity .45s; overflow-y: auto;
    }
    .overlay.show { opacity: 1; pointer-events: all; }
    .ov-inner {
      display: flex; flex-direction: column; align-items: center; gap: 14px;
      padding: 32px 24px 36px; max-width: 500px; width: 100%; position: relative; z-index: 1;
    }
    .ov-badge {
      font-family: 'DM Sans', sans-serif; font-size: .6rem; font-weight: 700;
      letter-spacing: .22em; text-transform: uppercase; color: var(--topic-color);
      background: rgba(var(--topic-rgb), .12); border: 1px solid rgba(var(--topic-rgb), .35);
      padding: .38rem 1.1rem; border-radius: 999px; display: none;
    }
    .ov-badge.show { display: block; animation: pulseBadge 1.8s ease-in-out infinite; }
    @keyframes pulseBadge { 0%,100%{box-shadow:0 0 0 0 rgba(var(--topic-rgb),.4)} 50%{box-shadow:0 0 0 10px rgba(var(--topic-rgb),0)} }
    .ov-title {
      font-family: 'Lora', serif; font-size: clamp(40px, 11vw, 72px); font-weight: 700; font-style: italic;
      color: var(--topic-color); line-height: 1;
      animation: popIn .5s cubic-bezier(.34,1.56,.64,1) forwards;
    }
    @keyframes popIn { 0%{transform:scale(.7);opacity:0} 70%{transform:scale(1.05)} 100%{transform:scale(1);opacity:1} }
    .ov-score { font-family: 'DM Sans', sans-serif; font-size: .95rem; letter-spacing: .05em; color: rgba(240,237,232,.45); }
    .ov-stars { display: flex; gap: 6px; font-size: 24px; }
    @keyframes starPop { 0%{transform:scale(0) rotate(-20deg);opacity:0} 70%{transform:scale(1.25) rotate(5deg)} 100%{transform:scale(1);opacity:1} }
    .ov-star { opacity: 0; }
    .overlay.show .ov-star:nth-child(1) { animation: starPop .4s cubic-bezier(.34,1.56,.64,1) .2s forwards; }
    .overlay.show .ov-star:nth-child(2) { animation: starPop .4s cubic-bezier(.34,1.56,.64,1) .35s forwards; }
    .overlay.show .ov-star:nth-child(3) { animation: starPop .4s cubic-bezier(.34,1.56,.64,1) .5s forwards; }
    .ov-msg { font-family: 'Lora', serif; font-size: .95rem; font-style: italic; color: rgba(240,237,232,.35); max-width: 320px; text-align: center; line-height: 1.8; }
    .ov-answers {
      width: 100%; max-height: 240px; overflow-y: auto;
      background: rgba(255,255,255,.02); border: 1px solid rgba(255,255,255,.06);
      border-radius: 1rem; padding: .5rem;
      scrollbar-width: thin; scrollbar-color: rgba(255,255,255,.1) transparent;
    }
    .ov-answers::-webkit-scrollbar { width: 4px; }
    .ov-answers::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 4px; }
    .ov-answer-item {
      display: flex; align-items: flex-start; justify-content: space-between;
      padding: .48rem .75rem; border-radius: .55rem; margin-bottom: .2rem;
      border-left: 2px solid transparent;
      opacity: 0; transform: translateX(-8px);
      animation: slideInA .35s ease forwards; gap: .75rem;
    }
    .ov-answer-item:last-child { margin-bottom: 0; }
    @keyframes slideInA { to { opacity: 1; transform: translateX(0); } }
    .ov-answer-item.ok   { background: rgba(77,201,138,.05); border-left-color: rgba(77,201,138,.4); }
    .ov-answer-item.skip { background: rgba(255,255,255,.02); border-left-color: rgba(255,255,255,.08); }
    .ov-ans-q { font-family: 'DM Sans', sans-serif; font-size: .7rem; font-weight: 600; color: rgba(240,237,232,.45); line-height: 1.4; flex: 1; }
    .ov-ans-r { font-family: 'Lora', serif; font-size: .7rem; font-style: italic; color: rgba(240,237,232,.25); text-align: right; max-width: 50%; line-height: 1.4; flex-shrink: 0; }
    .ov-ans-r.chosen { color: var(--topic-color); }
    .ov-btns { display: flex; gap: 10px; margin-top: 6px; flex-wrap: wrap; justify-content: center; }
    .ov-btn {
      font-family: 'DM Sans', sans-serif; font-size: .62rem; font-weight: 700;
      letter-spacing: .12em; padding: .75rem 1.6rem; border-radius: 999px;
      cursor: pointer; transition: all .16s; text-transform: uppercase;
    }
    .ov-btn.primary { background: var(--topic-color); color: #111010; border: 2px solid var(--topic-color); }
    .ov-btn.ghost { background: transparent; color: rgba(240,237,232,.45); border: 1px solid rgba(255,255,255,.15); }
    .ov-btn.ghost:hover { border-color: rgba(255,255,255,.3); color: var(--ink); }

    .streak-flash {
      position: fixed; top: 64px; left: 50%; transform: translateX(-50%);
      font-family: 'DM Sans', sans-serif; font-size: .7rem; font-weight: 700;
      letter-spacing: .15em; text-transform: uppercase;
      color: var(--topic-color); background: rgba(12,11,11,.92);
      border: 1px solid rgba(var(--topic-rgb), .4); border-radius: 999px; padding: .45rem 1.2rem;
      z-index: 150; pointer-events: none; opacity: 0; transition: opacity .3s; white-space: nowrap;
    }
    .streak-flash.show { opacity: 1; }

    .speak-prompt {
      font-family: 'DM Sans', sans-serif; font-size: .5rem; font-weight: 700;
      letter-spacing: .18em; text-transform: uppercase; color: rgba(var(--topic-rgb), .32);
      animation: breathe 3.2s ease-in-out infinite;
    }
    @keyframes breathe { 0%,100%{opacity:.2} 50%{opacity:.65} }

    @media(max-width:600px){
      .slide { padding: 1.5rem 1.2rem 1rem; gap: .85rem; }
      .q-text.size-short  { font-size: clamp(1.3rem, 6.5vw, 2rem); }
      .q-text.size-medium { font-size: clamp(1.1rem, 5.5vw, 1.6rem); }
      .q-text.size-long   { font-size: clamp(.95rem, 4.5vw, 1.3rem); }
      .opt-text { font-size: .9rem; }
      .vocab-word { font-size: clamp(1.8rem, 9vw, 3rem); }
      .bottom-bar { flex-wrap: wrap; height: auto; padding: .5rem 1rem .65rem; }
      .stage { bottom: 90px; } .progress { bottom: 90px; }
      .topic-tabs { justify-content: flex-start; } .nav-arrows { padding: 0 .3rem; }
    }
  </style>
</head>
<body>

<div class="loading-screen" id="loadingScreen"><div class="ld"></div></div>

<header class="header">
  <a class="back-link" href="index.html">← Home</a>
  <div class="topic-tabs" id="topicTabs"></div>
  <div class="slide-counter" id="slideCounter">1 / 1</div>
</header>

<div class="stage">
  <div class="slide-card" id="slideCard">
    <div class="section-label" id="sectionLabel"></div>
    <div class="slides-container" id="slidesContainer"></div>
    <div class="nav-arrows">
      <button class="arrow-btn" id="prevBtn">←</button>
      <button class="arrow-btn" id="nextBtn">→</button>
    </div>
    <div class="dot-nav" id="dotNav"></div>
  </div>
</div>

<div class="progress"><div class="progress-fill" id="progressFill"></div></div>

<div class="bottom-bar">
  <div class="score-row">
    <div class="score-item">
      <div class="score-dot"></div>
      <span class="score-num" id="scoreOk">0</span>
      <span class="score-label">answered</span>
    </div>
  </div>
  <div class="auto-row" id="autoRow">
    <span class="auto-label">Auto</span>
    <div class="switch"></div>
  </div>
</div>

<div class="overlay" id="overlay">
  <canvas id="confettiCanvas" style="position:fixed;inset:0;pointer-events:none;z-index:0;"></canvas>
  <div class="ov-inner">
    <div class="ov-badge" id="ovBadge">✦ Complete ✦</div>
    <div class="ov-title" id="ovTitle">Done</div>
    <div class="ov-score" id="ovScore"></div>
    <div class="ov-stars" id="ovStars"></div>
    <div class="ov-msg" id="ovMsg"></div>
    <div class="ov-answers" id="ovAnswers"></div>
    <div class="ov-btns">
      <button class="ov-btn primary" onclick="restart()">↺ Again</button>
      <button class="ov-btn ghost" onclick="closeOverlay()">Review</button>
    </div>
  </div>
</div>

<div class="streak-flash" id="streakFlash"></div>

<script>
const TOPICS = [
  {
    id:'memories', label:'🕰 Memories', color:'#C9A961', rgb:'201,169,97', type:'speaking',
    questions:[
      {q:'What is your <em class="hl">happiest childhood memory</em>?', options:['Playing outside with friends until it was dark — those summers felt endless.','Sitting with my family at the dinner table, listening to stories and laughing.','A special trip we took together — I can still smell the sea air.']},
      {q:'What did you love most about <em class="hl">school</em>?', options:['The friendships — some of those people are still in my life today.','Learning to read. The moment it clicked felt like magic.','Lunchtime — running around, forgetting everything else.']},

let topicIdx=0, slides=[], current=0, prev=-1;
let autoOn=false, autoTimer=null, busy=false;
let results={}, scoreOk=0, streak=0;
const AUTO_MS=8000;

window.addEventListener('load',()=>{
  buildTabs(); applyTheme(); buildSlides(); paintDOM();
  document.getElementById('loadingScreen').classList.add('fade');
  setTimeout(()=>{ document.getElementById('loadingScreen').style.display='none'; show(0,'none'); },500);
});

function buildTabs(){
  const wrap=document.getElementById('topicTabs');
  wrap.innerHTML='';
  TOPICS.forEach((t,i)=>{
    const btn=document.createElement('button');
    btn.className='ttab'+(i===topicIdx?' active':'');
    btn.textContent=t.label;
    btn.style.setProperty('--topic-color',t.color);
    btn.style.setProperty('--topic-rgb',t.rgb);
    btn.addEventListener('click',e=>{e.stopPropagation();switchTopic(i);});
    wrap.appendChild(btn);
  });
}

function applyTheme(){
  const t=TOPICS[topicIdx];
  document.documentElement.style.setProperty('--topic-color',t.color);
  document.documentElement.style.setProperty('--topic-rgb',t.rgb);
}

function switchTopic(i){
  topicIdx=i; results={}; scoreOk=0; streak=0;
  document.getElementById('scoreOk').textContent=0;
  document.querySelectorAll('.ttab').forEach((b,j)=>b.classList.toggle('active',j===i));
  applyTheme(); buildSlides(); paintDOM(); show(0,'none'); resetAuto();
}

function buildSlides(){
  slides=TOPICS[topicIdx].questions.map((q,idx)=>({idx,q}));
  current=0; prev=-1;
}

function paintDOM(){
  const container=document.getElementById('slidesContainer');
  const dotNav=document.getElementById('dotNav');
  const topic=TOPICS[topicIdx];
  container.innerHTML=slides.map((s,i)=>`<div class="slide" data-idx="${i}">${renderSlide(s,i,topic.type)}</div>`).join('');
  dotNav.innerHTML=slides.map((s,i)=>{
    const r=results[`t${topicIdx}_${s.idx}`];
    return `<div class="${'dot'+(r!=null?' ok':'')}" data-dot="${i}"></div>`;
  }).join('');
  dotNav.querySelectorAll('.dot').forEach(d=>d.addEventListener('click',e=>{e.stopPropagation();jump(+d.dataset.dot);}));
  updateCounter();
}

function renderSlide(s,si,type){
  if(type==='grammar')    return renderGrammar(s.q,si);
  if(type==='vocabulary') return renderVocab(s.q,si);
  return renderSpeaking(s.q,si);
}

function renderSpeaking(q,si){
  const words=q.q.replace(/<[^>]+>/g,'').split(/\s+/).length;
  const sz=words<=10?'size-short':words<=18?'size-medium':'size-long';
  const opts=q.options.map((o,i)=>`
    <button class="opt-btn" data-opt="${i}" onclick="chooseOpt(${si},${i},this)">
      <span class="opt-letter">${['A','B','C'][i]}</span>
      <span class="opt-text">"${o}"</span>
    </button>`).join('');
  return `<div class="q-label">Speak your answer</div>
    <div class="q-text ${sz}">${q.q}</div>
    <div class="options-wrap">${opts}</div>
    <div class="speak-prompt" id="sp_${si}">choose the answer closest to yours</div>
    <div class="fb-bar" id="fb_${si}"><span class="fb-text" id="fbt_${si}"></span></div>`;
}

function renderGrammar(q,si){
  const words=q.q.replace(/<[^>]+>/g,'').split(/\s+/).length;
  const sz=words<=12?'size-short':'size-medium';
  const egs=q.examples.map(e=>`<div>${e}</div>`).join('');
  const opts=q.options.map((o,i)=>`
    <button class="opt-btn" data-opt="${i}" onclick="chooseOpt(${si},${i},this)">
      <span class="opt-letter">${['A','B','C'][i]}</span>
      <span class="opt-text">${o}</span>
    </button>`).join('');
  return `<div class="grammar-point">${q.point}</div>
    <div class="grammar-rule">${q.rule}</div>
    <div class="grammar-examples">${egs}</div>
    <div class="q-text ${sz}" style="margin-top:.1rem">${q.q}</div>
    <div class="options-wrap">${opts}</div>
    <div class="fb-bar" id="fb_${si}"><span class="fb-text" id="fbt_${si}"></span></div>`;
}

function renderVocab(q,si){
  const opts=q.options.map((o,i)=>`
    <button class="opt-btn" data-opt="${i}" onclick="chooseOpt(${si},${i},this)">
      <span class="opt-letter">${['A','B','C'][i]}</span>
      <span class="opt-text">${o}</span>
    </button>`).join('');
  return `<div class="vocab-pos">${q.pos}</div>
    <div class="vocab-word">${q.word}</div>
    <div class="vocab-def">${q.def}</div>
    <div class="vocab-ex">${q.example}</div>
    <div class="options-wrap" style="margin-top:.3rem">${opts}</div>
    <div class="fb-bar" id="fb_${si}"><span class="fb-text" id="fbt_${si}"></span></div>`;
}

function show(idx,dir){
  if(!slides.length) return;
  const els=document.querySelectorAll('.slide');
  const dots=document.querySelectorAll('.dot');
  if(prev>=0&&prev!==idx&&els[prev]){
    els[prev].classList.remove('active');
    if(dir!=='none'){
      els[prev].classList.add('exit-left');
      setTimeout(()=>els[prev]?.classList.remove('exit-left'),480);
    }
  }
  if(els[idx]){
    if(dir==='forward')       els[idx].style.cssText='transform:translateX(60px);opacity:0';
    else if(dir==='back')     els[idx].style.cssText='transform:translateX(-60px);opacity:0';
    else                      els[idx].style.cssText='';
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      els[idx].classList.add('active'); els[idx].style.cssText='';
    }));
    const key=`t${topicIdx}_${slides[idx].idx}`;
    const r=results[key];
    if(r!=null) setTimeout(()=>restoreState(idx,r),55);
  }
  dots.forEach((d,i)=>d.classList.toggle('active',i===idx));
  document.getElementById('prevBtn').disabled=idx===0;
  document.getElementById('nextBtn').disabled=idx===slides.length-1;
  document.getElementById('sectionLabel').textContent=TOPICS[topicIdx].id.toUpperCase()+' · '+(idx+1);
  updateCounter(); updateProgress();
  prev=idx; current=idx;
}

function restoreState(si,chosenIdx){
  const btns=document.querySelectorAll(`.slide[data-idx="${si}"] .opt-btn`);
  btns.forEach((b,i)=>{
    b.classList.add('locked');
    b.classList.add(i===chosenIdx?'chosen':'not-chosen');
  });
  const sp=document.getElementById(`sp_${si}`);
  if(sp) sp.style.display='none';
  const fb=document.getElementById(`fb_${si}`);
  const fbt=document.getElementById(`fbt_${si}`);
  if(fb&&fbt){ fb.classList.add('show'); fbt.innerHTML=feedbackHtml(si,chosenIdx); }
}

function chooseOpt(si,optIdx,btn){
  const key=`t${topicIdx}_${slides[si].idx}`;
  if(results[key]!=null) return;
  const topic=TOPICS[topicIdx];
  const correct=(topic.type==='speaking')||optIdx===0;
  results[key]=optIdx;
  scoreOk++; if(correct) streak++; else streak=0;
  document.getElementById('scoreOk').textContent=scoreOk;
  const btns=document.querySelectorAll(`.slide[data-idx="${si}"] .opt-btn`);
  btns.forEach((b,i)=>{ b.classList.add('locked'); b.classList.add(i===optIdx?'chosen':'not-chosen'); });
  const sp=document.getElementById(`sp_${si}`);
  if(sp) sp.style.display='none';
  const fb=document.getElementById(`fb_${si}`);
  const fbt=document.getElementById(`fbt_${si}`);
  if(fb&&fbt){ fb.classList.add('show'); fbt.innerHTML=feedbackHtml(si,optIdx); }
  refreshDots(); updateProgress();
  const allDone=TOPICS[topicIdx].questions.every((_,i)=>results[`t${topicIdx}_${i}`]!=null);
  if(allDone){ document.querySelectorAll('.ttab')[topicIdx].classList.add('done'); setTimeout(()=>showResults(),1400); return; }
  if(streak>0&&streak%3===0) showStreak();
  setTimeout(()=>{ if(current<slides.length-1) next(); },1600);
}

function feedbackHtml(si,optIdx){
  const topic=TOPICS[topicIdx];
  if(topic.type==='speaking') return 'Say it aloud — then move on when ready.';
  const correct=optIdx===0;
  if(correct) return '<strong>Correct.</strong> Well done.';
  return `<strong>Not quite.</strong> Correct: <em>${slides[si].q.options[0].substring(0,65)}…</em>`;
}

function showResults(){
  const topic=TOPICS[topicIdx];
  const total=topic.questions.length;
  const done=topic.questions.filter((_,i)=>results[`t${topicIdx}_${i}`]!=null).length;
  const pct=Math.round(done/total*100);
  document.getElementById('ovTitle').textContent=pct===100?'Brilliant!':pct>=60?'Well Done':'Good Start';
  document.getElementById('ovBadge').classList.toggle('show',pct===100);
  document.getElementById('ovScore').textContent=done+' of '+total+' answered';
  const stars=pct>=90?3:pct>=60?2:pct>=30?1:0;
  document.getElementById('ovStars').innerHTML=Array.from({length:3},(_,i)=>`<span class="ov-star">${i<stars?'★':'☆'}</span>`).join('');
  document.getElementById('ovMsg').textContent=pct===100?'You went through every question. Your English is alive.':pct>=60?'Good practice. Try another topic when ready.':'A solid warm-up. Work through the remaining slides.';
  document.getElementById('ovAnswers').innerHTML=topic.questions.map((q,i)=>{
    const chosen=results[`t${topicIdx}_${i}`];
    const plain=(q.q||q.word||'').replace(/<[^>]+>/g,'');
    const delay=i*38;
    return `<div class="ov-answer-item ${chosen!=null?'ok':'skip'}" style="animation-delay:${delay}ms">
      <span class="ov-ans-q">${plain.substring(0,54)}${plain.length>54?'…':''}</span>
      <span class="ov-ans-r ${chosen!=null?'chosen':''}">${chosen!=null?'"'+q.options[chosen].substring(0,46)+'…"':'skipped'}</span>
    </div>`;
  }).join('');
  document.getElementById('overlay').classList.add('show');
  if(pct===100) triggerConfetti();
}

function restart(){
  document.getElementById('overlay').classList.remove('show'); stopConfetti();
  results={}; scoreOk=0; streak=0; document.getElementById('scoreOk').textContent=0;
  document.querySelectorAll('.ttab')[topicIdx].classList.remove('done');
  buildSlides(); paintDOM(); show(0,'none'); resetAuto();
}
function closeOverlay(){ document.getElementById('overlay').classList.remove('show'); stopConfetti(); show(0,'none'); }

function next(){ if(busy||current>=slides.length-1) return; busy=true; show(current+1,'forward'); setTimeout(()=>busy=false,480); resetAuto(); }
function back(){ if(busy||current<=0) return; busy=true; show(current-1,'back'); setTimeout(()=>busy=false,480); resetAuto(); }
function jump(idx){ if(busy) return; busy=true; show(idx,idx>current?'forward':'back'); setTimeout(()=>busy=false,480); resetAuto(); }

function refreshDots(){
  document.querySelectorAll('.dot').forEach((d,i)=>{
    const key=`t${topicIdx}_${slides[i]?.idx}`; const r=results[key];
    d.className='dot';
    if(i===current) d.classList.add('active'); else if(r!=null) d.classList.add('ok');
  });
}
function updateProgress(){
  if(autoOn) return;
  const topic=TOPICS[topicIdx];
  const done=topic.questions.filter((_,i)=>results[`t${topicIdx}_${i}`]!=null).length;
  document.getElementById('progressFill').style.width=(done/topic.questions.length*100)+'%';
}
function updateCounter(){ document.getElementById('slideCounter').textContent=(current+1)+' / '+slides.length; }

function showStreak(){
  const el=document.getElementById('streakFlash');
  el.textContent=['🗣 '+streak+' done!','✨ Keep going!','🔥 '+streak+' in a row!'][Math.floor(Math.random()*3)];
  el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),2000);
}

function startAuto(){
  stopAuto();
  const fill=document.getElementById('progressFill');
  fill.style.transition='none'; fill.style.width='0%';
  requestAnimationFrame(()=>{
    fill.style.transition=`width ${AUTO_MS}ms linear`; fill.style.width='100%';
  });
  autoTimer=setTimeout(()=>{
    if(current<slides.length-1) next(); else { buildSlides(); paintDOM(); show(0,'none'); }
    if(autoOn) startAuto();
  },AUTO_MS);
}
function stopAuto(){
  clearTimeout(autoTimer);
  const fill=document.getElementById('progressFill');
  fill.style.transition='none'; fill.style.width='0%';
}
function resetAuto(){ if(autoOn) startAuto(); }
function toggleAuto(){
  autoOn=!autoOn;
  document.getElementById('autoRow').classList.toggle('on',autoOn);
  autoOn?startAuto():stopAuto();
}

let confettiAnim=null;
function triggerConfetti(){
  const canvas=document.getElementById('confettiCanvas');
  const ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth; canvas.height=window.innerHeight;
  const t=TOPICS[topicIdx];
  const ps=Array.from({length:90},()=>({
    x:Math.random()*canvas.width, y:Math.random()*canvas.height-canvas.height,
    r:Math.random()*5+3, d:Math.random()*5+2,
    color:[t.color,'#4DC98A','#fff','#f5e6cc'][Math.floor(Math.random()*4)],
    tilt:Math.random()*10-10, tiltAngle:0, tiltAngleInc:Math.random()*.06+.04
  }));
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ps.forEach(p=>{
      p.tiltAngle+=p.tiltAngleInc; p.y+=p.d; p.tilt=Math.sin(p.tiltAngle)*14;
      if(p.y>canvas.height){p.y=-20;p.x=Math.random()*canvas.width;}
      ctx.beginPath(); ctx.lineWidth=p.r/2; ctx.strokeStyle=p.color;
      ctx.moveTo(p.x+p.tilt+p.r/4,p.y); ctx.lineTo(p.x+p.tilt,p.y+p.tilt+p.r/4); ctx.stroke();
    });
    confettiAnim=requestAnimationFrame(draw);
  }
  draw(); setTimeout(stopConfetti,5000);
}
function stopConfetti(){
  if(confettiAnim){cancelAnimationFrame(confettiAnim);confettiAnim=null;}
  const c=document.getElementById('confettiCanvas');
  c.getContext('2d').clearRect(0,0,c.width,c.height);
}

document.getElementById('prevBtn').addEventListener('click',e=>{e.stopPropagation();back();});
document.getElementById('nextBtn').addEventListener('click',e=>{e.stopPropagation();next();});
let tx=0;
document.getElementById('slideCard').addEventListener('touchstart',e=>{tx=e.touches[0].clientX;},{passive:true});
document.getElementById('slideCard').addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx;
  if(Math.abs(dx)>50){dx<0?next():back();}
},{passive:true});
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();next();}
  if(e.key==='ArrowLeft'){e.preventDefault();back();}
  if(e.key==='a'||e.key==='A') toggleAuto();
  if(e.key==='1') clickOpt(0);
  if(e.key==='2') clickOpt(1);
  if(e.key==='3') clickOpt(2);
});
function clickOpt(i){
  const btns=document.querySelectorAll(`.slide[data-idx="${current}"] .opt-btn`);
  if(btns[i]&&!btns[i].classList.contains('locked')) btns[i].click();
}
document.getElementById('autoRow').addEventListener('click',e=>{e.stopPropagation();toggleAuto();});
</script>
